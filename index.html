<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brick Breaker</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #111827);
            min-height: 100vh;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            padding: 20px;
        }

        .top_bar {
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .score_box {
            background: rgba(255, 255, 255, 0.08);
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 18px;
            backdrop-filter: blur(10px);
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 75vh;
            border-radius: 20px;
            overflow: hidden;
            border: 3px solid rgba(255, 255, 255, 0.15);
            background: linear-gradient(to bottom, #1e293b, #020617);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
        }

        .bricks {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 4px;
            padding: 12px;
        }

        .brick {
            height: 22px;
            border-radius: 4px;
        }

        .blue {
            background: #3b82f6;
        }

        .green {
            background: #22c55e;
        }

        .yellow {
            background: #facc15;
        }

        .red {
            background: #ef4444;
        }

        .ball {
            position: absolute;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: white;
            box-shadow: 0 0 15px white;
            top: 350px;
            left: 180px;
        }

        .bar {
            position: absolute;
            width: 90px;
            height: 14px;
            background: linear-gradient(to right, #38bdf8, #0ea5e9);
            border-radius: 30px;
            bottom: 15px;
            left: 150px;
            box-shadow: 0 0 20px #38bdf8;
        }

        /* GAME OVER POPUP */

        .game_over {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .popup {
            background: #111827;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            width: 90%;
            max-width: 320px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .popup h1 {
            color: #ef4444;
            margin-bottom: 10px;
        }

        .popup p {
            margin-bottom: 20px;
            font-size: 18px;
        }

        .popup button {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            background: #38bdf8;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        .popup button:hover {
            background: #0ea5e9;
        }

        /* MOBILE */

        @media (max-width: 600px) {

            body {
                padding: 10px;
            }

            .container {
                height: 80vh;
            }

            .bricks {
                gap: 2px;
                padding: 8px;
            }

            .brick {
                height: 18px;
            }

            .ball {
                width: 16px;
                height: 16px;
            }

            .bar {
                width: 80px;
                height: 12px;
            }

            .score_box {
                font-size: 16px;
                padding: 8px 14px;
            }
        }
    </style>
</head>

<body>

    <div class="top_bar">
        <div class="score_box">
            Score: <span id="score">0</span>
        </div>
    </div>

    <div class="container" id="gameBox">

        <div class="bricks" id="bricks"></div>

        <div class="ball" id="ball"></div>

        <div class="bar" id="bar"></div>

        <!-- GAME OVER -->
        <div class="game_over" id="gameOver">
            <div class="popup">
                <h1>Game Over</h1>
                <p>Your Score: <span id="finalScore">0</span></p>
                <button onclick="restartGame()">Play Again</button>
            </div>
        </div>

    </div>

    <script>

        const gameBox = document.getElementById("gameBox");
        const ball = document.getElementById("ball");
        const bar = document.getElementById("bar");
        const scoreEl = document.getElementById("score");
        const bricksContainer = document.getElementById("bricks");
        const gameOverScreen = document.getElementById("gameOver");
        const finalScore = document.getElementById("finalScore");

        let score = 0;
        let speedX = 3;
        let speedY = -3;
        let gameLoop;

        const brickColors = ["blue", "green", "yellow", "red"];

        const pointsMap = {
            blue: 1,
            green: 2,
            yellow: 3,
            red: 5
        };

        // CREATE BRICKS

        function createBricks() {

            bricksContainer.innerHTML = "";

            for (let i = 0; i < 72; i++) {

                const brick = document.createElement("div");

                const color =
                    brickColors[Math.floor(Math.random() * 4)];

                brick.classList.add("brick", color);

                bricksContainer.appendChild(brick);
            }
        }

        createBricks();

        // MOUSE CONTROL

        gameBox.addEventListener("mousemove", moveBar);

        // TOUCH CONTROL

        gameBox.addEventListener("touchmove", (e) => {

            const touch = e.touches[0];

            moveBar(touch);

        });

        function moveBar(e) {

            const rect = gameBox.getBoundingClientRect();

            let mouseX =
                e.clientX - rect.left - bar.offsetWidth / 2;

            if (mouseX < 0) mouseX = 0;

            if (mouseX + bar.offsetWidth > gameBox.clientWidth) {

                mouseX =
                    gameBox.clientWidth - bar.offsetWidth;
            }

            bar.style.left = mouseX + "px";
        }

        // BALL MOVEMENT

        function moveBall() {

            let ballX = ball.offsetLeft;
            let ballY = ball.offsetTop;

            // WALL COLLISION

            if (
                ballX <= 0 ||
                ballX + ball.offsetWidth >= gameBox.clientWidth
            ) {
                speedX *= -1;
            }

            if (ballY <= 0) {
                speedY *= -1;
            }

            // GAME OVER

            if (
                ballY + ball.offsetHeight >= gameBox.clientHeight
            ) {

                clearInterval(gameLoop);

                finalScore.textContent = score;

                gameOverScreen.style.display = "flex";

                return;
            }

            // BAR COLLISION

            const ballRect = ball.getBoundingClientRect();

            const barRect = bar.getBoundingClientRect();

            if (
                ballRect.bottom >= barRect.top &&
                ballRect.left <= barRect.right &&
                ballRect.right >= barRect.left &&
                ballRect.bottom <= barRect.bottom + 20
            ) {

                speedY = -Math.abs(speedY);
            }

            // BRICK COLLISION

            const bricks =
                document.querySelectorAll(".brick");

            for (let brick of bricks) {

                const brickRect =
                    brick.getBoundingClientRect();

                if (
                    ballRect.right >= brickRect.left &&
                    ballRect.left <= brickRect.right &&
                    ballRect.bottom >= brickRect.top &&
                    ballRect.top <= brickRect.bottom
                ) {

                    const color =
                        [...brick.classList]
                            .find(cls => pointsMap[cls]);

                    score += pointsMap[color];

                    scoreEl.textContent = score;

                    // RED BRICK SPEED BOOST

                    if (color === "red") {

                        speedX *= 1.1;
                        speedY *= 1.1;
                    }

                    brick.remove();

                    speedY *= -1;

                    break;
                }
            }

            // MOVE BALL

            ball.style.left =
                ballX + speedX + "px";

            ball.style.top =
                ballY + speedY + "px";
        }

        gameLoop = setInterval(moveBall, 10);

        // RESTART GAME

        function restartGame() {

            location.reload();
        }

    </script>

</body>

</html>
